<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atual Design - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <img src="assets/logoside1.png" alt="Logo da Atual Design" class="nav-logo">
    </div>

    <nav class="nav-right" aria-label="Navegação principal">
      <a href="/" class="nav-link"><span class="icon">🏠</span> Início</a>
      <a href="#" class="nav-link"><span class="icon">📖</span> Biblioteca</a>

      <div class="search-container">
        <label class="sr-only" for="search">Buscar</label>
        <input type="text" id="search" class="search-input" placeholder="Buscar">
        <button class="search-btn" type="button" aria-label="Buscar">🔍</button>
      </div>
    </nav>
  </header>

  <main class="main-container">
    <section class="card-cadastro" aria-labelledby="login-title">
      <h2 id="login-title">Página de login</h2>

      <form id="formLogin">
        <div class="form-group">
          <label for="loginIdentificador">Endereço de e-mail, CPF ou telefone:</label>
          <input type="text" id="loginIdentificador" name="loginIdentificador" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="loginSenha">Senha:</label>
          <input type="password" id="loginSenha" name="loginSenha" required autocomplete="current-password">
        </div>

        <div class="center-elements">
          <button type="submit" class="btn-cadastrar">Login</button>
          <a href="/cadastro" class="login-link">Não possuo uma conta<br>Cadastre-se aqui</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <span>atualdesigntorres@gmail.com</span>
    <span>Br 101 km 09, Tôrres, Rio Grande Do Sul, Brazil 95560000</span>
  </footer>

  <script src="login.js"></script>
</body>
</html>
