<!-- Declara que o documento é um arquivo HTML5 -->
<!DOCTYPE html>
<!-- Inicia a estrutura principal do documento HTML e define o idioma como português do Brasil -->
<html lang="pt-BR">
<!-- Abre a seção de cabeçalho do documento -->
<head>
    <!-- Define a codificação de caracteres para suporte a acentos e símbolos -->
    <meta charset="UTF-8">
    <!-- Garante que a página seja exibida corretamente em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Define o título da página exibido na aba do navegador -->
    <title>Atual Design - Cadastro</title>
    <!-- Vincula o arquivo de estilos CSS à página -->
    <link rel="stylesheet" href="style.css">
<!-- Fecha a seção de cabeçalho -->
</head>
<!-- Abre o corpo da página, onde o conteúdo visível é inserido -->
<body>

    <!-- Cria a barra de navegação do site -->
    <header class="navbar">
        <!-- Agrupa a parte esquerda da navbar com a marca do site -->
        <div class="nav-left">
            <!-- Exibe o nome da marca -->
            <span class="brand-title">Atual Design</span>
            <!-- Exibe a descrição da marca -->
            <span class="brand-subtitle">Móveis Sob Medida com Alto Padrão de Qualidade.</span>
        </div>
        <!-- Agrupa a parte direita da navbar com links e busca -->
        <div class="nav-right">
            <!-- Link para a página inicial -->
            <a href="#" class="nav-link"><span class="icon">🏠</span> Início</a>
            <!-- Link para a biblioteca de produtos -->
            <a href="#" class="nav-link"><span class="icon">📖</span> Biblioteca</a>
            <!-- Container para a barra de pesquisa -->
            <div class="search-container">
                <!-- Campo de texto para digitar a busca -->
                <input type="text" class="search-input">
                <!-- Botão de pesquisa -->
                <button class="search-btn">🔍</button>
            </div>
        </div>
    </header>

    <!-- Inicia o conteúdo principal da página -->
    <main class="main-container">
        <!-- Seção que contém o formulário de cadastro -->
        <section class="card-cadastro">
            <!-- Título da seção de cadastro -->
            <h2>Cadastro</h2>
            
            <!-- Formulário de cadastro com identificador para o JavaScript -->
            <form id="formCadastro">
                <!-- Grupo do campo de nome completo -->
                <div class="form-group">
                    <!-- Rótulo para o campo de nome -->
                    <label for="nome">Nome completo:</label>
                    <!-- Campo de entrada para o nome -->
                    <input type="text" id="nome" required>
                </div>

                <!-- Grupo do campo de e-mail -->
                <div class="form-group">
                    <!-- Rótulo para o campo de e-mail -->
                    <label for="email">Endereço de E-Mail:</label>
                    <!-- Campo de entrada para o e-mail -->
                    <input type="email" id="email" required>
                </div>

                <!-- Grupo do campo de senha -->
                <div class="form-group">
                    <!-- Rótulo para o campo de senha -->
                    <label for="senha">Senha:</label>
                    <!-- Campo de entrada para a senha -->
                    <input type="password" id="senha" required>
                </div>

                <!-- Grupo do campo de CPF -->
                <div class="form-group">
                    <!-- Rótulo para o campo de CPF -->
                    <label for="cpf">CPF:</label>
                    <!-- Campo de entrada para o CPF -->
                    <input type="text" id="cpf" required>
                </div>

                <!-- Grupo do campo de telefone -->
                <div class="form-group">
                    <!-- Rótulo para o campo de telefone -->
                    <label for="telefone">Número de telefone:</label>
                    <!-- Campo de entrada para o telefone -->
                    <input type="tel" id="telefone" required>
                </div>

                <!-- Linha de formulário com três campos -->
                <div class="form-row row-three">
                    <!-- Grupo do campo de estado/cidade -->
                    <div class="form-group pct-20">
                        <!-- Rótulo para o campo de estado -->
                        <label for="estado">Estado e cidade:</label>
                        <!-- Campo de entrada para o estado -->
                        <input type="text" id="estado" required>
                    </div>
                    <!-- Grupo do campo de CEP -->
                    <div class="form-group pct-20">
                        <!-- Rótulo para o campo de CEP -->
                        <label for="cep">CEP:</label>
                        <!-- Campo de entrada para o CEP -->
                        <input type="text" id="cep" required>
                    </div>
                    <!-- Grupo do campo de complemento -->
                    <div class="form-group pct-60">
                        <!-- Rótulo para o campo de complemento -->
                        <label for="complemento">Complemento:</label>
                        <!-- Campo de entrada para o complemento -->
                        <input type="text" id="complemento">
                    </div>
                </div>

                <!-- Linha de formulário com dois campos -->
                <div class="form-row row-two">
                    <!-- Grupo do campo de endereço -->
                    <div class="form-group pct-40">
                        <!-- Rótulo para o campo de endereço -->
                        <label for="endereco">Endereço:</label>
                        <!-- Campo de entrada para o endereço -->
                        <input type="text" id="endereco" required>
                    </div>
                    <!-- Grupo do campo de rua -->
                    <div class="form-group pct-60">
                        <!-- Rótulo para o campo de rua -->
                        <label for="rua">Rua:</label>
                        <!-- Campo de entrada para a rua -->
                        <input type="text" id="rua" required>
                    </div>
                </div>

                <!-- Área centralizada com botões e links de ação -->
                <div class="center-elements">
                    <!-- Botão para enviar o formulário de cadastro -->
                    <button type="submit" class="btn-cadastrar">Cadastrar-se</button>
                    <!-- Link para usuários que já possuem conta -->
                    <a href="/login" class="login-link">Já possuo uma conta<br>Clique para acessar</a>
                </div>
            </form>
        </section>
    </main>

    <!-- Rodapé da página com informações de contato -->
    <footer class="footer">
        <!-- E-mail de contato da empresa -->
        <span>atualdesigntorres@gmail.com</span>
        <!-- Endereço físico da empresa -->
        <span>Br 101 km 09, Tôrres, Rio Grande Do Sul, Brazil 95560000</span>
    </footer>

    <!-- Vincula o arquivo JavaScript que adiciona comportamento à página -->
    <script src="script.js"></script>
<!-- Fecha o corpo da página -->
</body>
<!-- Fecha o documento HTML -->
</html>
