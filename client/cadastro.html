<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atual Design - Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
    <div class="nav-left">
      <img src="assets/logoside1.png" alt="Logo da Atual Design" class="nav-logo">
    </div>

    <nav class="nav-right" aria-label="Navegação principal">
      <a href="/" class="nav-link"><span class="icon">🏠</span> Início</a>
      <a href="#" class="nav-link"><span class="icon">📖</span> Biblioteca</a>

      <div class="search-container">
        <label class="sr-only" for="search">Buscar</label>
        <input type="text" id="search" class="search-input" placeholder="Buscar">
        <button class="search-btn" type="button" aria-label="Buscar">🔍</button>
      </div>
    </nav>
  </header>

  <main class="main-container">
    <section class="card-cadastro" aria-labelledby="cadastro-title">
      <h2 id="cadastro-title">Cadastro</h2>

      <form id="formCadastro" novalidate>
        <div class="form-group">
          <label for="nome">Nome completo:</label>
          <input type="text" id="nome" name="nome" required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email">Endereço de e-mail:</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label for="cpf">CPF:</label>
          <input type="text" id="cpf" name="cpf" required inputmode="numeric">
        </div>

        <div class="form-group">
          <label for="telefone">Número de telefone:</label>
          <input type="tel" id="telefone" name="telefone" required autocomplete="tel">
        </div>

        <div class="form-row row-three">
          <div class="form-group pct-20">
            <label for="estado">Estado:</label>
            <select id="estado" name="estado" required>
              <option value="" disabled selected>Selecione</option>
              <option value="RS">RS</option>
              <option value="SC">SC</option>
              <option value="PR">PR</option>
            </select>
          </div>

          <div class="form-group pct-20">
            <label for="cep">CEP:</label>
            <input type="text" id="cep" name="cep" required maxlength="8" inputmode="numeric">
          </div>

          <div class="form-group pct-60">
            <label for="complemento">Complemento:</label>
            <input type="text" id="complemento" name="complemento">
          </div>
        </div>

        <div class="form-row row-two">
          <div class="form-group pct-40">
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" required>
          </div>

          <div class="form-group pct-60">
            <label for="rua">Rua:</label>
            <input type="text" id="rua" name="rua" required>
          </div>
        </div>

        <div class="center-elements">
          <button type="submit" class="btn-cadastrar">Cadastrar-se</button>
          <a href="/login" class="login-link">Já possuo uma conta<br>Clique para acessar</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="footer">
    <span>atualdesigntorres@gmail.com</span>
    <span>Br 101 km 09, Tôrres, Rio Grande Do Sul, Brazil 95560000</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
